<title>Canadian FWI Interactive Archive</title>

<link rel="icon"

<style>

body {

  margin: 0;

  font-family: Arial, sans-serif;

  overflow: hidden;

  background: #111;
}

#topbar {

  background: #222;

  color: white;

  padding: 10px 14px;

  display: flex;

  align-items: center;

  gap: 15px;

  height: 58px;

  box-sizing: border-box;

  z-index: 9999;
}

#title {

  font-size: 22px;

  font-weight: bold;

  white-space: nowrap;
}

#calendarButton {

  background: #D7191C;

  color: white;

  border: none;

  padding: 8px 14px;

  border-radius: 8px;

  font-size: 14px;

  font-weight: bold;

  cursor: pointer;

  transition: 0.15s;
}

#calendarButton:hover {

  background: #9E0D13;
}

#calendarPanel {

  display: none;

  position: absolute;

  top: 65px;
  left: 15px;

  z-index: 9999;

  background: rgba(34,34,34,0.97);

  padding: 15px;

  border-radius: 12px;

  box-shadow: 0 0 18px rgba(0,0,0,0.45);

  max-width: 92vw;

  max-height: 80vh;

  overflow-y: auto;
  overflow-x: auto;
}

#calendar {

  display: flex;

  gap: 12px;

  align-items: flex-start;

  flex-wrap: wrap;
}

.month-block {

  background: #2B2B2B;

  padding: 6px;

  border-radius: 8px;

  flex-shrink: 0;
}

.month-title {

  color: white;

  font-size: 12px;

  font-weight: bold;

  margin-bottom: 4px;

  text-align: center;
}

.month-grid {

  display: grid;

  grid-template-columns: repeat(7, 22px);

  gap: 3px;
}

.calendar-day {

  width: 22px;
  height: 22px;

  border-radius: 4px;

  display: flex;

  align-items: center;
  justify-content: center;

  font-size: 10px;
  font-weight: bold;

  user-select: none;
}

.available {

  background: #D7191C;

  color: white;

  cursor: pointer;

  transition: 0.12s;
}

.available:hover {

  background: #9E0D13;

  transform: scale(1.15);
}

.unavailable {

  background: #555;

  color: #888;
}

#mapFrame {

  width: 100%;

  height: calc(100vh - 58px);

  border: none;

  background: white;
}

@media (max-width: 900px) {

  #topbar {

    flex-wrap: wrap;

    height: auto;

    padding: 10px;

    gap: 10px;
  }

  #title {

    font-size: 16px;

    width: 100%;
  }

  #calendarButton {

    font-size: 13px;

    padding: 10px 14px;
  }

  #calendarPanel {

    top: 95px;
    left: 8px;
    right: 8px;

    max-width: unset;

    width: auto;

    max-height: 70vh;

    padding: 10px;
  }

  #calendar {

    gap: 8px;
  }

  .month-block {

    padding: 5px;
  }

  .month-title {

    font-size: 11px;
  }

  .month-grid {

    grid-template-columns: repeat(7, 28px);

    gap: 4px;
  }

  .calendar-day {

    width: 28px;
    height: 28px;

    font-size: 11px;

    border-radius: 6px;
  }

  #mapFrame {

    height: calc(100vh - 90px);
  }
}

</style>

<script>

function loadMap(path) {

  document
    .getElementById("mapFrame")
    .src = path;

  document
    .getElementById("calendarPanel")
    .style.display = "none";
}

document
  .getElementById("calendarButton")
  .addEventListener("click", function(event) {

    event.stopPropagation();

    const panel = document.getElementById("calendarPanel");

    if(panel.style.display === "block") {

      panel.style.display = "none";

    } else {

      panel.style.display = "block";
    }
});

document.addEventListener("click", function(event) {

  const panel = document.getElementById("calendarPanel");

  const button = document.getElementById("calendarButton");

  if(
    !panel.contains(event.target) &&
    !button.contains(event.target)
  ) {

    panel.style.display = "none";
  }
});

</script>
